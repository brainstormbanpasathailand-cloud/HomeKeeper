# Render Blueprint for HomeKeeper
# Provisions: PostgreSQL, FastAPI backend (Docker), React static frontend.
# Secrets marked `sync: false` must be filled in the Render dashboard — never
# commit real credentials.
databases:
  - name: homekeeper-db
    databaseName: homekeeper
    user: homekeeper
    plan: basic-256mb

services:
  # ---------- Backend (FastAPI) ----------
  - type: web
    name: homekeeper-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: homekeeper-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRE_MINUTES
        value: "15"
      - key: JWT_REFRESH_EXPIRE_DAYS
        value: "30"
      - key: FRONTEND_URL
        fromService:
          type: web
          name: homekeeper-web
          property: host
      - key: BACKEND_URL
        fromService:
          type: web
          name: homekeeper-api
          property: host
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: homekeeper-web
          property: host
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_ADMIN_NAME
        value: HomeKeeper Admin
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CALLBACK_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: FACEBOOK_APP_ID
        sync: false
      - key: FACEBOOK_APP_SECRET
        sync: false
      - key: FACEBOOK_CALLBACK_URL
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USERNAME
        sync: false
      - key: EMAIL_PASSWORD
        sync: false

  # ---------- Frontend (React static site) ----------
  - type: web
    name: homekeeper-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # set to https://homekeeper-api.onrender.com/api/v1
    routes:
      # SPA fallback so client-side routing works on refresh.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
